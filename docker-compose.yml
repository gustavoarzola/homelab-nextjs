version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: homelab-postgres
    environment:
      POSTGRES_USER: homelab_user
      POSTGRES_PASSWORD: homelab_password
      POSTGRES_DB: homelab_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U homelab_user -d homelab_db']
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: homelab-adminer
    ports:
      - '8080:8080'
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres

volumes:
  postgres_data:
